version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: newton-postgres-dev
    environment:
      POSTGRES_DB: newtonbot
      POSTGRES_USER: newton
      POSTGRES_PASSWORD: newton_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: newton-redis-dev
    command: redis-server --requirepass redis_secret
    ports:
      - "6379:6379"

volumes:
  postgres_data_dev:
