version: '3.8'

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: newton_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-newton}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newton_secret}
      POSTGRES_DB: ${POSTGRES_DB:-newtonbot}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newton}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: newton_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (NestJS) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: newton_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-newton}:${POSTGRES_PASSWORD:-newton_secret}@postgres:5432/${POSTGRES_DB:-newtonbot}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/health/ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Admin Mini App (Next.js static) ──────────────────────────────────────
  admin-miniapp:
    build:
      context: ./apps/admin-miniapp
      dockerfile: Dockerfile
    container_name: newton_admin
    restart: unless-stopped
    ports:
      - "3001:80"
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${BACKEND_PUBLIC_URL:-http://localhost:3000}
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
